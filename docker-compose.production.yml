version: '3.8'

# Production-specific Docker Compose configuration
# Use with: docker-compose -f docker-compose.yml -f docker-compose.production.yml up

services:
  # MongoDB with production settings
  mongodb:
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '1'
          memory: 2G
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_DATABASE}
    volumes:
      - /opt/cartaisy/data/mongodb:/data/db
      - /opt/cartaisy/data/mongodb-config:/data/configdb
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "10"

  # Redis with production settings
  redis:
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    command: >
      redis-server
      --appendonly yes
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 1gb
      --maxmemory-policy allkeys-lru
      --tcp-backlog 511
      --timeout 0
      --tcp-keepalive 300
    volumes:
      - /opt/cartaisy/data/redis:/data
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "10"

  # Cartaisy Backend with production settings
  app:
    image: cartaisy/backend:${VERSION:-latest}
    deploy:
      mode: replicated
      replicas: 3
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 1G
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 3
        window: 120s
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
        monitor: 60s
        max_failure_ratio: 0.3
    environment:
      NODE_ENV: production
      # All other environment variables should be in .env file
    volumes:
      - /opt/cartaisy/uploads:/app/uploads
      - /opt/cartaisy/logs:/app/logs
      - /opt/cartaisy/config/.env:/app/.env:ro
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"
        labels: "service=cartaisy-backend"

  # Nginx with SSL and production configuration
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
    volumes:
      - /opt/cartaisy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /opt/cartaisy/nginx/conf.d:/etc/nginx/conf.d:ro
      - /opt/cartaisy/ssl:/etc/nginx/ssl:ro
      - /opt/cartaisy/cache:/var/cache/nginx
      - /opt/cartaisy/logs/nginx:/var/log/nginx
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Prometheus for monitoring
  prometheus:
    image: prom/prometheus:latest
    container_name: cartaisy-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - /opt/cartaisy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - /opt/cartaisy/data/prometheus:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    networks:
      - cartaisy-network
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # Grafana for visualization
  grafana:
    image: grafana/grafana:latest
    container_name: cartaisy-grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD}
      GF_INSTALL_PLUGINS: redis-datasource
    volumes:
      - /opt/cartaisy/data/grafana:/var/lib/grafana
      - /opt/cartaisy/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    networks:
      - cartaisy-network
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # Backup service
  backup:
    image: cartaisy/backup:latest
    container_name: cartaisy-backup
    restart: unless-stopped
    environment:
      MONGODB_URI: mongodb://${MONGO_ROOT_USERNAME}:${MONGO_ROOT_PASSWORD}@mongodb:27017/?authSource=admin
      BACKUP_SCHEDULE: "0 2 * * *"  # Daily at 2 AM
      BACKUP_RETENTION_DAYS: 30
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      BACKUP_S3_BUCKET: ${BACKUP_S3_BUCKET}
    volumes:
      - /opt/cartaisy/backups:/backups
    depends_on:
      - mongodb
    networks:
      - cartaisy-network
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

volumes:
  # Use external volumes for production data persistence
  mongodb_data:
    external: true
    name: cartaisy_mongodb_data
  
  mongodb_config:
    external: true
    name: cartaisy_mongodb_config
  
  redis_data:
    external: true
    name: cartaisy_redis_data
  
  prometheus_data:
    external: true
    name: cartaisy_prometheus_data
  
  grafana_data:
    external: true
    name: cartaisy_grafana_data

networks:
  cartaisy-network:
    driver: overlay
    attachable: true
    ipam:
      config:
        - subnet: 172.20.0.0/16