name: Backend bug fix
description: Defect report for backend behavior.
title: "[Bug]: "
body:
  - type: markdown
    attributes:
      value: |
        Use this for backend defects. Include enough reproduction and risk context for agents and reviewers to avoid scope drift.
  - type: textarea
    id: bug-summary
    attributes:
      label: Bug summary
      placeholder: What is broken?
    validations:
      required: true
  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual-behavior
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: Steps to reproduce
      placeholder: "1. ..."
    validations:
      required: true
  - type: dropdown
    id: affected-area
    attributes:
      label: Affected area
      options:
        - Auth/session
        - Tenant/store ownership
        - Shopify integration
        - Cart/checkout/orders
        - Mobile API
        - Dashboard/admin API
        - Webhooks/sync
        - Home modules/config
        - Testing/build/tooling
        - Docs/context
        - Other
    validations:
      required: true
  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - Low
        - Medium
        - High
        - Critical
    validations:
      required: true
  - type: dropdown
    id: risk-level
    attributes:
      label: Risk level
      options:
        - Low
        - Medium
        - High
    validations:
      required: true
  - type: textarea
    id: tenant-security-impact
    attributes:
      label: Tenant/security impact
      placeholder: "State none, or describe tenant/security impact."
    validations:
      required: true
  - type: textarea
    id: shopify-api-impact
    attributes:
      label: Shopify API impact
      placeholder: "State none, or describe Shopify/API assumptions."
    validations:
      required: true
  - type: textarea
    id: api-contract-impact
    attributes:
      label: Mobile/dashboard API contract impact
      placeholder: "State none, or describe client-visible behavior changes."
    validations:
      required: true
  - type: textarea
    id: regression-risk
    attributes:
      label: Regression risk
      description: What existing behavior could be affected?
    validations:
      required: true
  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance criteria
      placeholder: "- ..."
    validations:
      required: true
  - type: textarea
    id: out-of-scope
    attributes:
      label: Out of scope
      placeholder: What should not be changed while fixing this bug?
    validations:
      required: true
  - type: textarea
    id: tests-required
    attributes:
      label: Tests required
      placeholder: Include regression tests when backend behavior changes.
    validations:
      required: true
  - type: textarea
    id: validation-commands
    attributes:
      label: Validation commands
      value: |
        - npm run type-check
        - npm test -- --runInBand --watchman=false
    validations:
      required: true
  - type: textarea
    id: docs-to-read
    attributes:
      label: Docs to read before work
      value: |
        - AGENTS.md
        - CARTAISY_CONTEXT.md
        - docs/cartaisy/README.md
        - docs/ARCHITECTURE.md
        - docs/STATUS.md
        - docs/DECISIONS.md
        - docs/TESTING.md
    validations:
      required: true
  - type: textarea
    id: logs-screenshots
    attributes:
      label: Logs/screenshots
      description: Add sanitized logs, screenshots, request IDs, or sample payloads if applicable. Do not include secrets.
  - type: textarea
    id: docs-to-update
    attributes:
      label: Docs to update if behavior changes
      placeholder: "State none, or list docs."
    validations:
      required: true
